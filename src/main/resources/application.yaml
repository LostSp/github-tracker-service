spring:
  application:
    name: github-commit-tracker

  datasource:
    url: jdbc:h2:mem:githubdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8080

slack:
  webhook:
    url: ${SLACK_WEBHOOK_URL}

